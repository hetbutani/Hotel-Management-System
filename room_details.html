<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Details - LuxeStay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-blue-700 tracking-tighter">LuxeStay</a>
            <a href="/" class="text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Home
            </a>
        </div>
    </nav>

    <main id="room-content" class="max-w-6xl mx-auto py-12 px-6">
        <!-- Skeleton Loader -->
        <div id="loader" class="animate-pulse flex flex-col gap-12">
            <div class="h-[450px] bg-slate-200 rounded-3xl w-full"></div>
            <div class="space-y-4">
                <div class="h-10 bg-slate-200 rounded w-1/3"></div>
                <div class="h-32 bg-slate-200 rounded w-full"></div>
            </div>
        </div>
    </main>

    <script>
        function initiateBooking(roomTitle, price) {
            window.location.href = `/checkout.html?room=${encodeURIComponent(roomTitle)}&price=${price}`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const roomTitle = params.get('room');
            const content = document.getElementById('room-content');

            if (!roomTitle) {
                content.innerHTML = '<div class="text-center py-20"><h2 class="text-2xl font-bold text-slate-400">Room not specified.</h2><a href="/" class="text-blue-600 font-bold mt-4 inline-block underline">Return to Home</a></div>';
                return;
            }

            try {
                const response = await fetch(`/api/rooms/details/${encodeURIComponent(roomTitle)}`);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`Server returned ${response.status}: ${errorData.error || response.statusText}`);
                }
                
                const room = await response.json();
                
                content.innerHTML = `
                    <div class="flex flex-col lg:flex-row gap-12">
                        <div class="flex-1">
                            <img src="${room.image_url}" class="w-full h-[500px] object-cover rounded-[2.5rem] shadow-2xl mb-10" />
                            <div class="flex items-center gap-4 mb-4">
                                <span class="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-1.5 uppercase tracking-wider">
                                    <span class="material-symbols-outlined text-sm">verified</span> Verified Suite
                                </span>
                            </div>
                            <h1 class="text-5xl font-black text-slate-900 mb-6">${room.title}</h1>
                            <div class="flex items-center gap-6 mb-10 text-slate-500 font-medium">
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-blue-600">star</span>
                                    <span>${room.rating} Rating</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-blue-600">group</span>
                                    <span>${room.capacity} Guests</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-blue-600">square_foot</span>
                                    <span>Modern View</span>
                                </div>
                            </div>
                            <p class="text-xl text-slate-600 leading-relaxed mb-12">${room.description}</p>
                            
                            <h3 class="text-2xl font-bold text-slate-900 mb-8">Exclusive Amenities</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                ${room.features.map(f => `
                                    <div class="flex items-center gap-4 p-5 bg-white border border-slate-100 rounded-2xl shadow-sm hover:border-blue-200 transition-all">
                                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                                            <span class="material-symbols-outlined text-blue-600">${f.icon}</span>
                                        </div>
                                        <span class="font-bold text-slate-700">${f.text}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="w-full lg:w-96">
                            <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 sticky top-28">
                                <div class="mb-8">
                                    <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mb-2">Price Per Night</p>
                                    <div class="flex items-baseline gap-2">
                                        <span class="text-5xl font-black text-blue-600">$${room.price}</span>
                                        <span class="text-slate-400 font-bold text-lg">/ night</span>
                                    </div>
                                </div>
                                
                                <button onclick="initiateBooking('${room.title}', ${room.price})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-[1.5rem] shadow-xl shadow-blue-100 transition-all active:scale-[0.98] mb-6 flex items-center justify-center gap-3">
                                    <span class="material-symbols-outlined">calendar_month</span>
                                    Book This Room
                                </button>
                                
                                <div class="space-y-4 pt-6 border-t border-slate-50">
                                    <div class="flex items-center gap-3 text-sm text-slate-500 font-medium">
                                        <span class="material-symbols-outlined text-green-500 text-lg">check_circle</span>
                                        Free cancellation before 48h
                                    </div>
                                    <div class="flex items-center gap-3 text-sm text-slate-500 font-medium">
                                        <span class="material-symbols-outlined text-green-500 text-lg">check_circle</span>
                                        Instant confirmation
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                content.innerHTML = `
                    <div class="text-center py-20">
                        <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                            <span class="material-symbols-outlined text-red-500 text-4xl">error</span>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-900 mb-2">Unable to load details</h2>
                        <p class="text-slate-500">${error.message}</p>
                        <button onclick="location.reload()" class="mt-8 bg-slate-900 text-white px-8 py-3 rounded-full font-bold">Try Again</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
