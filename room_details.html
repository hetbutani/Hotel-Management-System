<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Details - LuxeStay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="code.html" class="text-2xl font-black text-blue-700">LuxeStay</a>
            <a href="code.html" class="text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors">← Back to Home</a>
        </div>
    </nav>

    <main id="room-content" class="max-w-5xl mx-auto py-12 px-6">
        <div class="animate-pulse flex flex-col gap-8">
            <div class="h-96 bg-slate-200 rounded-2xl w-full"></div>
            <div class="h-8 bg-slate-200 rounded w-1/3"></div>
            <div class="h-24 bg-slate-200 rounded w-full"></div>
        </div>
    </main>

    
    <script>
        async function initiateBooking(roomTitle, price) {
            try {
                // 1. Create Order
                const orderRes = await fetch('/api/payments/create_order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: price })
                });
                const order = await orderRes.json();

                if (!order.id) throw new Error('Order creation failed');

                // 2. Open Checkout
                const options = {
                    "key": "rzp_test_YourKeyId",
                    "amount": order.amount,
                    "currency": "INR",
                    "name": "LuxeStay",
                    "description": `Booking for ${roomTitle}`,
                    "order_id": order.id,
                    "handler": async function (response) {
                        // 3. Verify Payment
                        const verifyRes = await fetch('/api/payments/verify', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature
                            })
                        });

                        if (verifyRes.ok) {
                            // 4. Save Booking
                            await fetch('/api/bookings', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    room_title: roomTitle,
                                    check_in: new Date().toISOString().split('T')[0], // Placeholder dates
                                    check_out: new Date(Date.now() + 86400000).toISOString().split('T')[0],
                                    guests: "1 Guest",
                                    payment_id: response.razorpay_payment_id
                                })
                            });
                            alert(`Success! Payment received for ${roomTitle}.`);
                        } else {
                            alert('Payment verification failed.');
                        }
                    },
                    "theme": { "color": "#2563eb" }
                };
                const rzp = new Razorpay(options);
                rzp.open();
            } catch (e) {
                alert('Payment failed to start.');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {

            const params = new URLSearchParams(window.location.search);
            const roomTitle = params.get('room');
            const content = document.getElementById('room-content');

            if (!roomTitle) {
                content.innerHTML = '<p class="text-center text-slate-500">Room not specified.</p>';
                return;
            }

            try {
                const response = await fetch(`/api/rooms/details/${encodeURIComponent(roomTitle)}`);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`Server returned ${response.status}: ${errorData.error || response.statusText}`);
                }
                
                const room = await response.json();
                
                content.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-12">
                        <div class="flex-1">
                            <img src="${room.image_url}" class="w-full h-[450px] object-cover rounded-3xl shadow-2xl mb-8" />
                            <h1 class="text-4xl font-black text-slate-900 mb-4">${room.title}</h1>
                            <div class="flex items-center gap-4 mb-6">
                                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-sm">star</span> ${room.rating}
                                </span>
                                <span class="text-slate-400 font-medium">|</span>
                                <span class="text-slate-500 font-medium">${room.capacity} Guests Max</span>
                            </div>
                            <p class="text-lg text-slate-600 leading-relaxed mb-8">${room.description}</p>
                            
                            <h3 class="text-xl font-bold text-slate-900 mb-4">Room Amenities</h3>
                            <div class="grid grid-cols-2 gap-4">
                                ${room.features.map(f => `
                                    <div class="flex items-center gap-3 p-4 bg-white border border-slate-100 rounded-xl shadow-sm">
                                        <span class="material-symbols-outlined text-blue-600">${f.icon}</span>
                                        <span class="font-medium text-slate-700">${f.text}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="w-full md:w-80">
                            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 sticky top-24">
                                <div class="mb-6">
                                    <span class="text-4xl font-black text-blue-600">$${room.price}</span>
                                    <span class="text-slate-400 font-medium ml-1">/ night</span>
                                </div>
                                <button onclick="initiateBooking('${room.title}', ${room.price})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 transition-all mb-4">
                                    Book This Room
                                </button>
                                <p class="text-center text-xs text-slate-400 font-medium uppercase tracking-widest">Free cancellation up to 48h</p>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                content.innerHTML = '<p class="text-center text-red-500">Failed to load room details.</p>';
            }
        });
    </script>
</body>
</html>
