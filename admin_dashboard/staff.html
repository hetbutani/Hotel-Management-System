<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Staff Directory - LuxeStay</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        // Authentication Check
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (!token || role !== 'Admin') window.location.href = '../auth/login.html';
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            window.location.href = '../auth/login.html';
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar -->
    <nav class="fixed left-0 top-0 h-screen w-64 border-r border-slate-200 bg-slate-50 py-6 px-4 z-50 flex flex-col">
        <div class="mb-8 px-4"><span class="text-lg font-bold text-blue-700 tracking-tight">LuxeStay</span></div>
        <div class="flex flex-col gap-2 flex-grow">
            <a href="code.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-100 transition-all">
                <span class="material-symbols-outlined">dashboard</span><span>Dashboard</span>
            </a>
            <a href="bookings.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-100 transition-all">
                <span class="material-symbols-outlined">calendar_month</span><span>Bookings</span>
            </a>
            <a href="staff.html" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-50 text-blue-700 font-bold border-r-4 border-blue-600">
                <span class="material-symbols-outlined">badge</span><span>Staff Directory</span>
            </a>
            <a href="../guest_landing_page/code.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-100 mt-auto">
                <span class="material-symbols-outlined">public</span><span>View Site</span>
            </a>
            <a href="javascript:void(0)" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50">
                <span class="material-symbols-outlined">logout</span><span>Sign Out</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 ml-64 flex flex-col min-h-screen">
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-black text-slate-800">Staff Management</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-slate-500">Admin Control Panel</span>
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-xs">AJ</div>
            </div>
        </header>

        <div class="p-8">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-slate-800">Personnel Directory</h2>
                    <button onclick="loadStaff()" class="p-2 text-blue-600 hover:bg-blue-50 rounded-full transition-all">
                        <span class="material-symbols-outlined">refresh</span>
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                                <th class="px-6 py-4">Staff Name & ID</th>
                                <th class="px-6 py-4">Assigned Room</th>
                                <th class="px-6 py-4">Current Customer</th>
                                <th class="px-6 py-4">Duty Status</th>
                            </tr>
                        </thead>
                        <tbody id="staff-table-body" class="divide-y divide-slate-100">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadStaff() {
            const tbody = document.getElementById('staff-table-body');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-20 text-slate-400">Loading staff directory...</td></tr>';

            try {
                const response = await fetch('/api/admin/staff');
                const staff = await response.json();

                tbody.innerHTML = '';
                staff.forEach(s => {
                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 font-bold text-xs">
                                        ${s.name.split(' ').map(n => n[0]).join('')}
                                    </div>
                                    <div>
                                        <div class="font-bold text-slate-800">${s.name}</div>
                                        <div class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">${s.staff_id}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 font-medium text-slate-700 text-sm">
                                ${s.room}
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm font-bold text-slate-800">${s.customer}</div>
                                <div class="text-[10px] text-slate-400">Active Handling</div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">
                                    On Duty
                                </span>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-20 text-red-500 font-bold">Failed to load staff data.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadStaff);
    </script>
</body>
</html>
